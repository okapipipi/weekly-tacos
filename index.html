<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="週次Tacos アーカイブ — Weekly All Hands" />
  <title>週次Tacos アーカイブ — Weekly All Hands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{ --bg:#fff7ed; --fg:#2a2438; --fg-muted:#7a738a; --grape:#6b5bff; --pink:#ff7ab6; --mint:#51d0a8; --line:rgba(42,36,56,.10); --elev:#fff; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--fg);font-family:"Plus Jakarta Sans","Noto Sans JP",sans-serif;line-height:1.6;min-height:100vh;
      background-image:radial-gradient(circle at 1px 1px, rgba(42,36,56,.06) 1px, transparent 0);background-size:22px 22px;}
    .wrap{max-width:760px;margin:0 auto;padding:clamp(2.5rem,6vw,5rem) 1.5rem 4rem;}
    .kicker{font-family:"Plus Jakarta Sans",monospace;font-weight:700;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--pink);display:flex;align-items:center;gap:.5rem;}
    .kicker::before{content:"🌮";font-size:.95rem;}
    h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;margin:.6rem 0 .4rem;letter-spacing:-.01em;}
    h1 .g{background:linear-gradient(100deg,var(--pink),var(--mint));-webkit-background-clip:text;background-clip:text;color:transparent;}
    .lead{color:var(--fg-muted);font-size:1.02rem;margin-bottom:2.4rem;}
    .list{display:flex;flex-direction:column;gap:.9rem;}
    a.week{display:flex;align-items:center;gap:1rem;text-decoration:none;color:inherit;background:var(--elev);border:1px solid var(--line);border-radius:18px;padding:1.1rem 1.3rem;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;}
    a.week:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,122,182,.14);border-color:var(--pink);}
    .week__date{font-weight:800;font-size:1.05rem;min-width:7.5rem;}
    .week__date small{display:block;font-weight:500;font-size:.72rem;color:var(--fg-muted);letter-spacing:.02em;}
    .week__title{flex:1;font-weight:700;}
    .week__title span{display:block;font-weight:500;font-size:.82rem;color:var(--fg-muted);}
    .week__go{font-size:1.3rem;color:var(--pink);}
    footer{margin-top:3rem;color:var(--fg-muted);font-size:.8rem;text-align:center;}
  </style>
</head>
<body>
  <main class="wrap">
    <span class="kicker">Weekly Tacos</span>
    <h1>週次<span class="g">Tacos</span> アーカイブ</h1>
    <p class="lead">毎週社内で送られた Tacos（感謝）の全件まとめの一覧です。各回をクリックすると開きます。</p>
    <div class="list">
      <!-- ▼ 新しい回はこの上に追加 -->
      <a class="week" href="2026-06-05/">
        <span class="week__date">2026.06.05<small>FRI</small></span>
        <span class="week__title">先週のTacos（全23件）<span>対象期間 5/29 11:00 〜 6/5 11:00</span></span>
        <span class="week__go">→</span>
      </a>
    </div>
    <footer>DigiMan ／ Weekly All Hands</footer>
  </main>
</body>
</html>
